# Standalone staging compose for Coolify.
# Do NOT use locally — use: make staging
# All secrets (APP_KEY, DB_PASSWORD, DB_ROOT_PASSWORD) must be set
# as Environment Variables in the Coolify service dashboard.

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      APP_NAME: "My Store [Staging]"
      APP_ENV: staging
      APP_DEBUG: "true"
      APP_URL: "${APP_URL}"
      FRONTEND_URL: "${APP_URL}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-my_store_staging}"
      DB_USERNAME: "${DB_USERNAME:-shopw}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "My Store [Staging]"
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shopw
      - coolify

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-my_store_staging}"
      MYSQL_USER: "${DB_USERNAME:-shopw}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopw

volumes:
  app_storage:
  db_data:

networks:
  shopw:
    driver: bridge
  coolify:
    external: true
