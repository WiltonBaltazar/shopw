services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "8080:8080"   # Coolify proxies your domain → 8080
    env_file: .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shopw

  db:
    # DB port NOT exposed on prod – only reachable inside Docker network
    ports: !reset []
